          - text: Your customers' data
          - text: stays within your borders.
        - paragraph [ref=e655]: For telcos, banks, and government providers, where data lives and who can reach it is the first question, not the last. WorldPosta is built so that data residency, certification, and isolation are properties of the platform, not promises bolted on afterward.
