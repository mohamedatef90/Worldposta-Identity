        - generic [ref=e645]: Why WorldPosta · About
        - heading "The team behind the layer you operate." [level=2] [ref=e647]:
          - text: The team behind
          - text: the layer you operate.
        - paragraph [ref=e648]: WorldPosta has spent more than a decade building and running the software that powers cloud, mail, and collaboration for service providers. The platform runs across a globally distributed footprint and is built and operated to internationally recognized standards for information security, privacy, and payment data.
        - paragraph [ref=e649]: WorldPosta does not compete for your customers. We operate the layer beneath your brand, so the trust, the relationship, and the revenue stay with you while we keep the platform running, updated, and secure.
      - generic [ref=e651]:
